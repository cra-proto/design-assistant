name: Deploy AIDA Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Backend-design-assistant
          aws-region: ca-central-1

      - name: Build Lambda OAuth function
        working-directory: backend/functions/github-oauth
        run: |
          npm ci
          npm run build
          mkdir -p dist
          cp package*.json dist/
          cp -R build/* dist/ 2>/dev/null || true
          cd dist
          npm ci --production
          cd ..
          zip -r -q lambda.zip dist/
      
      - name: Upload OAuth Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-oauth-lambda
          path: backend/functions/github-oauth/lambda.zip
          retention-days: 1

      - name: Build Lambda Project function
        working-directory: backend/functions/projects
        run: |
          npm ci
          npm run build
          mkdir -p dist
          cp package*.json dist/
          cp -R build/* dist/ 2>/dev/null || true
          cd dist
          npm ci --production
          cd ..
          zip -r -q lambda.zip dist/
       
      - name: Upload Projects Artifact
        uses: actions/upload-artifact@v4
        with:
          name: projects-lambda
          path: backend/functions/projects/lambda.zip
          retention-days: 1
              
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      - name: Terraform Init
        working-directory: backend/terraform
        run: terraform init
      
      - name: Terraform Plan
        working-directory: backend/terraform
        run: terraform plan
      
      - name: Terraform Apply
        working-directory: backend/terraform
        run: terraform apply -auto-approve
