name: Deploy AIDA Backend to AWS

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/dev" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Backend-design-assistant
          aws-region: ca-central-1

      - name: Build Lambda OAuth function
        working-directory: backend/functions/github-oauth
        run: |
          npm ci
          npm run build
          cp package*.json dist/
          cd dist
          npm ci --production
          zip -r -q lambda.zip .
          mv lambda.zip ..
      
      - name: Upload OAuth Artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-oauth-lambda
          path: backend/functions/github-oauth/lambda.zip
          retention-days: 1

      - name: Build Lambda Projects function
        working-directory: backend/functions/projects
        run: |
          npm ci
          npm run build
          cp package*.json dist/
          cd dist
          npm ci --production
          zip -r -q lambda.zip .
          mv lambda.zip ..
       
      - name: Upload Projects Artifact
        uses: actions/upload-artifact@v4
        with:
          name: projects-lambda
          path: backend/functions/projects/lambda.zip
          retention-days: 1
              
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      - name: Terraform Init
        working-directory: backend/terraform
        run: terraform init

      - name: Select Terraform Workspace
        working-directory: backend/terraform
        run: |
          terraform workspace select ${{ steps.env.outputs.environment }} || terraform workspace new ${{ steps.env.outputs.environment }}
      
      - name: Terraform Plan
        working-directory: backend/terraform
        run: terraform plan -var-file="${{ steps.env.outputs.environment }}.tfvars"
      
      - name: Terraform Apply
        working-directory: backend/terraform
        run: terraform apply -var-file="${{ steps.env.outputs.environment }}.tfvars" -auto-approve
      
      - name: Output deployment info
        working-directory: backend/terraform
        run: |
          echo "Deployed to ${{ steps.env.outputs.environment }} environment"
          echo "CloudFront: $(terraform output -raw cloudfront_domain_name)"
          echo "S3 Bucket: $(terraform output -raw s3_bucket_name)"
      