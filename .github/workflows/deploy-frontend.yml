name: Deploy Angular Frontend to AWS

on:
  push:
    branches: [ main ] # Change to your deployment branch if different

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'  # Change to match your Node.js version
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Angular app
      run: npm run build:prod  # Adjust the build command if necessary
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole # Use AWS account ID and role name
        aws-region: ca-central-1  # Use your AWS region
        
    - name: Deploy to S3
      run: aws s3 sync dist/content-assistant/browser s3://ai-design-assistant-test --delete # Use your dist folder and S3 bucket name
        
    - name: Invalidate CloudFront cache
      run: aws cloudfront create-invalidation --distribution-id EOUPF3T8Z3WXK --paths "/*" # Use your CloudFront distribution ID