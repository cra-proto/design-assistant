name: Deploy Angular Frontend to AWS

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'backend/**'
      - '**.md'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - production

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Determine environment
      id: env
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
          echo "environment=production" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref }}" == "refs/heads/dev" ]; then
          echo "environment=dev" >> $GITHUB_OUTPUT
        fi
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'  # Change to match your Node.js version
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Angular app
      run: |
        if [ "${{ steps.env.outputs.environment }}" == "production" ]; then
          npm run build:prod
        else
          npm run build:dev
        fi
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Frontend-design-assistant # Use AWS account ID and role name
        aws-region: ca-central-1  # Use your AWS region

    - name: Get infrastructure outputs
      id: infra
      working-directory: backend/terraform
      run: |
        # Install Terraform
        wget -O terraform.zip https://releases.hashicorp.com/terraform/1.13.5/terraform_1.13.5_linux_amd64.zip
        unzip -q terraform.zip
        chmod +x terraform
        sudo mv terraform /usr/local/bin/
        
        # Get outputs
        terraform init
        terraform workspace select ${{ steps.env.outputs.environment }}
        echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
        echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
    
    - name: Deploy to S3
      run: |
        aws s3 sync dist/content-assistant/browser s3://${{ steps.infra.outputs.s3_bucket }} --delete
    
    - name: Invalidate CloudFront cache
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ steps.infra.outputs.cloudfront_id }} \
          --paths "/*"

    - name: Output deployment info
      run: |
        echo "Deployed to ${{ steps.env.outputs.environment }} environment"
        echo "S3 Bucket: ${{ steps.infra.outputs.s3_bucket }}"
        echo "CloudFront ID: ${{ steps.infra.outputs.cloudfront_id }}"