name: Import Existing Production Resources (ONE-TIME)

on:
  workflow_dispatch:

jobs:
  verify-backend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Backend-design-assistant
          aws-region: ca-central-1
      
      - name: Build Lambda OAuth function
        working-directory: backend/functions/github-oauth
        run: |
          npm ci
          npm run build
          cp package*.json dist/
          cd dist
          npm ci --production
          zip -r -q lambda.zip .
          mv lambda.zip ..
      
      - name: Build Lambda Projects function
        working-directory: backend/functions/projects
        run: |
          npm ci
          npm run build
          cp package*.json dist/
          cd dist
          npm ci --production
          zip -r -q lambda.zip .
          mv lambda.zip ..
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5
          terraform_wrapper: false

      - name: Terraform Init and Select Workspace
        working-directory: backend/terraform
        run: |
          terraform init
          terraform workspace select production || terraform workspace new production
      
      - name: Import Missing Backend Resources
        working-directory: backend/terraform
        continue-on-error: true
        run: |
          # Only import resources that aren't already imported
          # Use correct syntax for IAM role policies (colon separator)
          terraform import -var-file="production.tfvars" aws_iam_role_policy.lambda_secrets_policy design-assistant-lambda-role:design-assistant-lambda-secrets-policy 2>/dev/null || echo "Already imported or failed"
          terraform import -var-file="production.tfvars" aws_iam_role_policy.lambda_dynamodb_policy design-assistant-lambda-role:design-assistant-lambda-dynamodb-policy 2>/dev/null || echo "Already imported or failed"
          
          # Import API Gateway stage
          API_ID=$(terraform output -raw api_id 2>/dev/null || echo "")
          if [ -n "$API_ID" ]; then
            terraform import -var-file="production.tfvars" aws_apigatewayv2_stage.api "${API_ID}/production" 2>/dev/null || echo "Already imported or failed"
          fi
      
      - name: Verify Backend State
        working-directory: backend/terraform
        run: |
          echo "==== Current Terraform State ===="
          terraform state list
          echo ""
          echo "==== Terraform Plan ===="
          terraform plan -var-file="production.tfvars"

  verify-frontend:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Frontend-design-assistant
          aws-region: ca-central-1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5
          terraform_wrapper: false

      - name: Terraform Init and Select Workspace
        working-directory: frontend/terraform
        run: |
          terraform init
          terraform workspace select production || terraform workspace new production
      
      - name: Verify Frontend State
        working-directory: frontend/terraform
        run: |
          echo "==== Current Terraform State ===="
          terraform state list
          echo ""
          echo "==== Terraform Plan ===="
          terraform plan -var-file="production.tfvars"