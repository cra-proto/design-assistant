name: Terraform Import DynamoDB

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to import into'
        required: true
        type: choice
        options:
          - dev
          - production

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::013957137556:role/GitHubActionsRole-Backend-design-assistant
          aws-region: ca-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.5

      - name: Terraform Init
        working-directory: backend/terraform
        run: terraform init

      - name: Select Terraform Workspace
        working-directory: backend/terraform
        run: terraform workspace select ${{ inputs.environment }}

      - name: Import DynamoDB tables
        working-directory: backend/terraform
        run: |
          terraform import -var-file="${{ inputs.environment }}.tfvars" aws_dynamodb_table.usage design-assistant-usage || echo "usage already imported"
          terraform import -var-file="${{ inputs.environment }}.tfvars" aws_dynamodb_table.prompts design-assistant-prompts || echo "prompts already imported"