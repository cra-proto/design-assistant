name: Terraform Import

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "import" to confirm'
        required: true

jobs:
  import:
    if: github.event.inputs.confirm == 'import'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ca-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./your-terraform-dir

      - name: Import DynamoDB tables
        working-directory: ./your-terraform-dir
        run: |
          terraform import aws_dynamodb_table.usage design-assistant-usage || echo "usage already imported"
          terraform import aws_dynamodb_table.prompts design-assistant-prompts || echo "prompts already imported"
