<h2 class="text-2xl my-1">GitHub repository</h2>
<div class="flex flex-column gap-2">
    <div class="flex flex-column gap-1">
        <p-iftalabel>
            <input type="text" id="owner" pInputText [(ngModel)]="gitHubOwner" pSize="small" fluid (blur)="updateOwner();updateRepoList()" maxlength="39" [pKeyFilter]="ownerFilter" [ngClass]="{ 'ng-invalid ng-dirty': ownerError }" />
            <label for="repo">Owner</label>
        </p-iftalabel>
        <p-message severity="error" variant="simple" size="small" *ngIf="ownerError">{{ownerError}}</p-message>
    </div>
    <p-iftalabel>
        <p-autocomplete id="repo" [(ngModel)]="gitHubRepo" [suggestions]="filteredRepos" (input)="updateRepo()" (onBlur)="updateRepo();syncName()" (completeMethod)="filterRepos($event);" [dropdown]=true pSize="small" maxlength="100" [pKeyFilter]="repoFilter" fluid />
        <label for="repo">Repository</label>
    </p-iftalabel>
    <p-iftalabel>
        <input type="text" id="branch" pInputText [(ngModel)]="gitHubBranch" pSize="small" fluid (blur)="updateBranch()" [pKeyFilter]="branchFilter" />
        <label for="branch">Branch</label>
    </p-iftalabel>
    <div class="flex align-items-center gap-2 mt-1">
        <p-checkbox [(ngModel)]="gitHubBaseline" inputId="baseline" [binary]="true" size="large" />
        <label for="baseline" class="text-lg">Include baseline repo</label>
    </div>
</div>
