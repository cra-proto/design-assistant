<div class="flex align-items-center justify-content-center" style="min-height: 60vh;">
    <div class="text-center">
        @if (!error()) {
        <p-progressSpinner aria-labelledby="authenticating" />
        <h2 id="authenticating" class="mt-3">{{'github.callback.authenticating' | translate}}<span class="loading-dots"></span></h2>
        } @else {
        <p-message severity="error" size="large" icon="pi pi-exclamation-triangle" [text]="error()! | translate" />
        }
    </div>
</div>
