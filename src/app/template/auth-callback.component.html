<div class="flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="text-center">
        @if (!error()) {
        <p-progressSpinner />
        <h2 class="mt-3">Authenticating with GitHub...</h2>
        } @else {
        <p-message severity="error" [text]="error()!" />
        }
    </div>
</div>
