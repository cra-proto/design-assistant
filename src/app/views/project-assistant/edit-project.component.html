<h1 id="wb-cont">{{ (hasName ? 'project._nav.edit' : 'project._nav.new') | translate }}</h1>

<!--TODO: move these 2 messages to their respective components, under the H2's-->
@if (!hasName){
<p-message severity="info" icon="pi pi-info-circle font-bold" [text]="'project.message.noName' | translate" styleClass="mb-2" />
}
@if(!hasRepo){
<p-message severity="info" icon="pi pi-info-circle font-bold" [text]="'project.message.noRepo' | translate" styleClass="mb-2" />
}

<div class="flex lg:flex-row flex-column gap-3">
    <!--Project Card-->
    <div class="surface-card border-round-lg shadow-2 p-4 lg:mb-3 lg:w-4 w-full">
        <aida-setup-project />
    </div>
    <!--GitHub Card-->
    <div class="surface-card border-round-lg shadow-2 p-4 lg:mb-3 lg:w-4 w-full">
        <aida-setup-repo />
    </div>
    <!--Collaborators Card-->
    <div class="surface-card border-round-lg shadow-2 p-4 lg:mb-3 lg:w-4 w-full">
        <aida-add-collaborators mode="list" />
    </div>
</div>

<div class="flex lg:flex-row flex-column gap-3">
    <div class="surface-card border-round-lg shadow-2 p-4 my-3 lg:mt-0 lg:w-8">
        <div class="flex flex-column lg:flex-row justify-content-between align-items-start gap-3">
            <div class="w-full">
                <aida-add-pages />
            </div>
            <div class="mt-3 lg:mt-0 flex flex-row lg:flex-column gap-2">
                <p-button
                          label="View project URLs"
                          icon="pi pi-list"
                          outlined
                          size="small"
                          styleClass="secondary-outline w-full min-w-max"
                          (click)="showUrls = true" />
                <p-drawer header="URLs" [(visible)]="showUrls" position="right" styleClass="w-6">
                    <ul>
                        <li *ngFor="let url of projectState.getAllUrls('inScope')">{{url}}</li>
                    </ul>
                </p-drawer>
                <p-button
                          label="View IA diagram"
                          icon="pi pi-sitemap"
                          outlined
                          size="small"
                          styleClass="secondary-outline w-full min-w-max"
                          (click)="iaDiagram.openDiagram()" />

                <!--p-button
                      label="View breadcrumbs"
                      icon="pi pi-equals"
                      outlined
                      size="small"
                      styleClass="secondary-outline w-full min-w-max"
                      (click)="showBreadcrumb = true">
            </p-button>
            <p-drawer header="Breadcrumb" [(visible)]="showBreadcrumb" position="bottom"></p-drawer-->

                <div class="flex flex-row justify-content-center align-items-center">
                    <i class="pi pi-copy text-primary text-6xl"></i>
                    <div class="flex flex-column">
                        <p class="my-0 font-bold text-2xl">{{inScopePageCount()}}</p>
                        <p class="my-0">pages</p>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <div class="surface-card border-round-lg shadow-2 p-4 my-3 lg:mt-0 lg:w-4">
        <aida-find-pages />
    </div>
</div>
